                        <div style={{ fontWeight: 600 }}>{r.autoRub > 0 ? `${r.autoRub.toLocaleString("ru")} ₽` : "—"}</div>
                      </div>
                    </div>
                    <div style={{ fontSize: 10, color: "var(--color-text-secondary)", marginTop: 4 }}>
                      Выход: {r.departure ? fmt(r.departure) : "под запрос"} | Терминал: {r.terminal} {r.comment ? `| ${r.comment}` : ""}
                      {r.dropValidity ? ` | Дроп: ${r.dropValidity}` : ""}
                    </div>
                    {r.dateWarnings && r.dateWarnings.length > 0 && (
                      <div style={{ display: "flex", gap: 4, marginTop: 3, flexWrap: "wrap" }}>
                        {r.dateWarnings.map((w, wi) => <Badge key={wi} color="#A32D2D" bg="#FCEBEB" style={{ fontSize: 9 }}>⚠ {w}</Badge>)}
                      </div>
                    )}
                    <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 6 }}>
                      <button style={{ ...C.btn(), fontSize: 10, padding: "3px 10px" }} onClick={() => goToKP && goToKP({
                        ctype: ctype === "20" ? "20DC" : "40HC",
                        pol: r.pol,
                        freightBase: r.isRubFreight ? 0 : r.totalFreightUsd,
                        freightMargin: Number(mUsd) || 0,
                        railwayDest: city,
                        railwayBase: r.rwBase,
                        railwayMargin: Number(mRub) || 0,
                        guard: r.rwGuard,
                        autoCity: r.autoLabel ? city : "",
                        autoPrice: r.autoRub,
                        departure: r.departure || "",
                        line: r.line,
                        ownerType: r.ownerType,
                        service: r.service,
                      })}>→ Создать КП</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

const EMPTY_VARIANT = () => ({
  id: uid(),
  ctype: "20DC",
  incoterms: "FOB",
  port: "",
  freight_base: "",
  freight_margin: "100",
  railway_dest: "",
  railway_base: "",
  railway_margin: "10000",
  security: "5932",
  security_on: false,
  truck_on: false,
  truck_city: "",
  truck_km_mkad: "",
  truck_price: "",
  weight_kg: "",
  departure_date: "",
});

function formatKPVariant(v, idx) {
  const lines = [];
  const freightTotal = Number(v.freight_base || 0) + Number(v.freight_margin || 0);
  const railTotal = Number(v.railway_base || 0) + Number(v.railway_margin || 0);
  let n = 1;
  lines.push(`${n}) Фрахт ${v.ctype} ${v.incoterms} ${v.port}: $${freightTotal}`);
  n++;
  if (v.railway_dest) {
    lines.push(`${n}) Ж.д., перевозка ВМТП - ${v.railway_dest}: ${railTotal.toLocaleString("ru-RU")} ₽`);
    n++;
  }
  if (v.security_on) {
    lines.push(`${n}) Охрана РЖД (при необходимости): ${Number(v.security || 0).toLocaleString("ru-RU")} ₽`);
    n++;
  }
  if (v.truck_on && v.truck_city) {
    const kmNote = v.truck_km_mkad ? `, пробег за МКАД ${v.truck_km_mkad} км` : "";
    lines.push(`${n}) Автовывоз в ${v.truck_city} (в т.ч., все станционные, перевес${kmNote}): ${Number(v.truck_price || 0).toLocaleString("ru-RU")} ₽ (в т.ч., НДС 22%)`);
    n++;
  }
  if (v.weight_kg) {
    lines.push(`   Вес груза: ${Number(v.weight_kg).toLocaleString("ru-RU")} кг`);
  }
  if (v.departure_date) {
    lines.push(`   Выход: ${v.departure_date}`);
  }
  return lines.join("\n");
}

function ProposalsTab({ proposals, leads, up, settings, kpFromCalc, setKpFromCalc }) {

  const [leadId, setLeadId] = useState("");
  const [kpType, setKpType] = useState("intro");
  const [variants, setVariants] = useState([EMPTY_VARIANT()]);
  const [emailIntro, setEmailIntro] = useState("Добрый день!\n\nНаправляем Вам ставки по интересующим направлениям:\n");
  const [emailOutro, setEmailOutro] = useState("\nС уважением,\nОтдел продаж BM Logistics");
  const [previewOpen, setPreviewOpen] = useState(false);
  const [expandedKP, setExpandedKP] = useState(null);
  const [sending, setSending] = useState(null);

  // Auto-fill from calculator
  useEffect(() => {
    if (kpFromCalc) {
      const v = EMPTY_VARIANT();
      v.ctype = kpFromCalc.ctype || "40HC";
      v.port = kpFromCalc.pol || "";
      v.freight_base = String(kpFromCalc.freightBase || "");
      v.freight_margin = String(kpFromCalc.freightMargin || "100");
      v.railway_dest = kpFromCalc.railwayDest || "";
      v.railway_base = String(kpFromCalc.railwayBase || "");
      v.railway_margin = String(kpFromCalc.railwayMargin || "10000");
      v.security = String(kpFromCalc.guard || "5932");
      v.security_on = (kpFromCalc.guard || 0) > 0;
      v.truck_on = (kpFromCalc.autoPrice || 0) > 0;
      v.truck_city = kpFromCalc.autoCity || "";
      v.truck_price = String(kpFromCalc.autoPrice || "");
      v.departure_date = kpFromCalc.departure || "";
      setVariants([v]);
      setKpType(kpFromCalc.departure ? "specific" : "intro");
      setShow(true);
      setKpFromCalc(null);
    }
  }, [kpFromCalc]);

  const sendEmail = async (proposal) => {
    if (!proposal.emails || proposal.emails.length === 0) { alert("У лида нет почты для КП"); return; }
    setSending(proposal.id);
    try {
      const res = await apiCall("POST", "/api/send", {
        to: proposal.emails,
        subject: "Коммерческое предложение — BM Logistics",
        body: proposal.text,
      });
      if (res.ok) {
        up("proposals", p => p.map(x => x.id === proposal.id ? { ...x, status: "sent", sent: new Date().toISOString() } : x));
        alert("Отправлено на " + proposal.emails.join(", "));
      } else {
        alert("Ошибка: " + (res.error || JSON.stringify(res)));
      }
    } catch (err) { alert("Ошибка сети: " + err.message); }
    setSending(null);
  };

  const selectedLead = leads.find(l => l.id === leadId);
  const kpEmails = selectedLead?.emails_kp || [];

  const addVariant = () => setVariants(p => [...p, EMPTY_VARIANT()]);
  const rmVariant = (id) => setVariants(p => p.filter(v => v.id !== id));
  const updVariant = (id, field, val) => setVariants(p => p.map(v => v.id === id ? { ...v, [field]: val } : v));

  const fullKPText = useMemo(() => {
    const body = variants.map((v, i) => {
      const header = variants.length > 1 ? `\nВариант ${i + 1}:\n` : "\n";
      return header + formatKPVariant(v, i);
    }).join("\n");
    return emailIntro + body + "\n" + emailOutro;
  }, [variants, emailIntro, emailOutro]);

  const saveKP = () => {
    const lead = leads.find(l => l.id === leadId);
    up("proposals", p => [...p, {
      id: uid(), lead_id: leadId, company: lead?.company_name || "",
      type: kpType, variants: variants.map(v => ({ ...v })),
      text: fullKPText, emails: kpEmails,
      ver: p.filter(x => x.lead_id === leadId).length + 1,
      status: "draft", created: new Date().toISOString(), sent: null,
    }]);
    setShow(false); setVariants([EMPTY_VARIANT()]); setLeadId("");
  };

    <div>

        <div style={C.section}>Коммерческие предложения ({proposals.length})</div>

            </div>

          <div style={{ display: "flex", gap: 6, marginTop: 12, justifyContent: "flex-end", alignItems: "center" }}>
            {leadId && <button style={{ ...C.btn(), fontSize: 11 }} onClick={() => { navigator.clipboard?.writeText(fullKPText); }}>Копировать текст</button>}
            <button style={C.btn()} onClick={() => { setShow(false); setVariants([EMPTY_VARIANT()]); }}>Отмена</button>
            <button style={C.btn(true)} onClick={saveKP} disabled={!leadId || !variants[0]?.freight_base}>Сохранить КП</button>
          </div>
        </div>
      )}

      {/* Saved proposals list */}
      {proposals.length === 0 ? <div style={{ ...C.card, ...C.empty }}>Нет КП</div> : (
        [...proposals].reverse().map(p => (
          <div key={p.id} style={{ ...C.card, padding: "11px 14px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <span style={{ fontWeight: 600 }}>{p.company}</span>
                <Badge color={p.type === "intro" ? "#185FA5" : "#D85A30"} bg={p.type === "intro" ? "#E6F1FB" : "#FAECE7"}>{p.type === "intro" ? "Ознак." : "Конкрет."}</Badge>
                <Badge color={p.status === "sent" ? "#3B6D11" : "#6B7280"} bg={p.status === "sent" ? "#EAF3DE" : "#F3F4F6"}>
                  {p.status === "draft" ? "Черновик" : "Отправлено"}
                </Badge>
                <span style={{ fontSize: 11, color: "var(--color-text-tertiary)" }}>#{p.ver} — {fmtFull(p.created)}</span>
              </div>
              <div style={{ display: "flex", gap: 4 }}>
                <button style={{ ...C.btn(), fontSize: 11 }} onClick={() => setExpandedKP(expandedKP === p.id ? null : p.id)}>
                  {expandedKP === p.id ? "Скрыть" : "Текст"}
                </button>
                <button style={{ ...C.btn(), fontSize: 11 }} onClick={() => { navigator.clipboard?.writeText(p.text || ""); }}>Копировать</button>
                {p.status === "draft" && p.emails?.length > 0 && <button style={{ ...C.btn(true), fontSize: 11 }} onClick={() => sendEmail(p)} disabled={sending === p.id}>{sending === p.id ? "Отправка..." : "Отправить"}</button>}
                {p.status === "draft" && (!p.emails || p.emails.length === 0) && <button style={{ ...C.btn(), fontSize: 11, color: "var(--color-text-tertiary)" }} disabled>Нет почты</button>}
              </div>
            </div>
            {p.emails?.length > 0 && <div style={{ fontSize: 10, color: "var(--color-text-tertiary)", marginTop: 3 }}>→ {p.emails.join(", ")}</div>}
            {p.variants && <div style={{ fontSize: 10, color: "var(--color-text-secondary)", marginTop: 3 }}>{p.variants.length} вариант(ов): {p.variants.map(v => `${v.ctype} ${v.incoterms} ${v.port}`).join(" | ")}</div>}
            {expandedKP === p.id && (
              <div style={{ marginTop: 8, padding: 10, background: "var(--color-background-secondary)", borderRadius: 8, fontSize: 12, fontFamily: "monospace", whiteSpace: "pre-wrap", lineHeight: 1.7 }}>
                {p.text}
              </div>
            )}
          </div>
        ))
      )}
    </div>
  );
}

// ─── PATTERNS ───
function PatternsTab({ patterns, up }) {
  const [f, setF] = useState({ cat: "success", text: "" });
  const cats = { success: { l: "Успех", c: "#3B6D11", bg: "#EAF3DE" }, failure: { l: "Провал", c: "#A32D2D", bg: "#FCEBEB" }, objection: { l: "Возражение", c: "#854F0B", bg: "#FAEEDA" }, market: { l: "Рынок", c: "#185FA5", bg: "#E6F1FB" } };
  const add = () => { if (!f.text.trim()) return; up("patterns", p => [...p, { id: uid(), cat: f.cat, text: f.text, at: new Date().toISOString() }]); setF(p => ({ ...p, text: "" })); };
  return (
    <div>
      <div style={C.section}>Паттерны</div>
      <p style={{ fontSize: 12, color: "var(--color-text-secondary)", marginBottom: 12 }}>Что работает, что нет. База знаний для AI.</p>
      <div style={{ ...C.card, display: "flex", gap: 8, alignItems: "flex-end" }}>
        <div><div style={C.lbl}>Категория</div><select style={C.sel} value={f.cat} onChange={e => setF(p => ({ ...p, cat: e.target.value }))}>{Object.entries(cats).map(([k, v]) => <option key={k} value={k}>{v.l}</option>)}</select></div>
        <div style={{ flex: 1 }}><div style={C.lbl}>Вывод</div><input style={C.inp} value={f.text} onChange={e => setF(p => ({ ...p, text: e.target.value }))} placeholder="Клиенты 5+ конт торгуются по срокам" onKeyDown={e => e.key === "Enter" && add()} /></div>
        <button style={C.btn(true)} onClick={add}>+</button>
      </div>
      {patterns.length === 0 ? <div style={{ ...C.card, ...C.empty }}>Пусто</div> : patterns.slice().reverse().map(p => (
        <div key={p.id} style={{ ...C.card, display: "flex", gap: 8, alignItems: "center", padding: 11 }}>
          <Badge color={cats[p.cat]?.c} bg={cats[p.cat]?.bg}>{cats[p.cat]?.l}</Badge>
          <div style={{ flex: 1 }}><div style={{ fontSize: 13 }}>{p.text}</div><div style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 2 }}>{fmtFull(p.at)}</div></div>
          <button style={{ background: "none", border: "none", cursor: "pointer", color: "var(--color-text-tertiary)", fontSize: 14 }} onClick={() => up("patterns", pp => pp.filter(x => x.id !== p.id))}>×</button>
        </div>
      ))}
    </div>
  );
}


// ─── SETTINGS ───
function SettingsTab({ settings, customAuto, up, onLogout }) {
  const [usdRate, setUsdRate] = useState(String(settings?.usdRate || 90));
  const [marginUsd, setMarginUsd] = useState(String(settings?.marginUsd || 100));
  const [marginRub, setMarginRub] = useState(String(settings?.marginRub || 5000));
  const [testEmail, setTestEmail] = useState("");
  const [testResult, setTestResult] = useState("");
  const [serverInfo, setServerInfo] = useState(null);
  const [newAuto, setNewAuto] = useState({ city: "", p20: "", p40: "" });

  useEffect(() => {
    apiCall("GET", "/api/health").then(d => setServerInfo(d)).catch(() => {});
  }, []);

  const saveSettings = () => {
    up("settings", () => ({ usdRate: Number(usdRate), marginUsd: Number(marginUsd), marginRub: Number(marginRub) }));
  };

  const sendTestEmail = async () => {
    if (!testEmail) { setTestResult("Введи email"); return; }
    setTestResult("Отправка...");
    try {
      const res = await apiCall("POST", "/api/send", {
        to: testEmail,
        subject: "Тест BML CRM",
        body: "Тестовое письмо из BML Sales Panel. Если вы видите это — отправка работает.",
      });
      if (res.ok) setTestResult("Отправлено! Проверь почту " + testEmail);
      else setTestResult("Ошибка: " + (res.error || JSON.stringify(res)));
    } catch (err) { setTestResult("Ошибка сети: " + err.message); }
  };

  const addAuto = () => {
    if (!newAuto.city) return;
    up("customAuto", p => [...(p || []).filter(a => a.city.toLowerCase() !== newAuto.city.toLowerCase()), { city: newAuto.city, p20: Number(newAuto.p20) || 0, p40: Number(newAuto.p40) || 0 }]);
    setNewAuto({ city: "", p20: "", p40: "" });
  };

  return (
    <div>
      <div style={C.section}>Настройки</div>
      <div style={C.card}>
        <div style={{ fontWeight: 600, marginBottom: 10 }}>Курс и маржа</div>
        <div style={C.g3}>
          <div><div style={C.lbl}>Курс USD/RUB</div><input style={C.inp} type="number" value={usdRate} onChange={e => setUsdRate(e.target.value)} /></div>
          <div><div style={C.lbl}>Маржа фрахт ($/конт)</div><input style={C.inp} type="number" value={marginUsd} onChange={e => setMarginUsd(e.target.value)} /></div>
          <div><div style={C.lbl}>Маржа ЖД (₽/конт)</div><input style={C.inp} type="number" value={marginRub} onChange={e => setMarginRub(e.target.value)} /></div>
        </div>
        <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 10 }}>
          <button style={C.btn(true)} onClick={saveSettings}>Сохранить</button>
        </div>
      </div>

      <div style={{ ...C.card, marginTop: 10 }}>
        <div style={{ fontWeight: 600, marginBottom: 10 }}>Почта (SMTP)</div>
        <div style={{ fontSize: 12, color: "var(--color-text-secondary)", marginBottom: 8 }}>
          SMTP настроен на сервере. {serverInfo?.smtp ? <span style={{ color: "#3B6D11" }}>✓ Подключен ({serverInfo.smtpUser})</span> : serverInfo?.smtpError ? <span style={{ color: "#A32D2D" }}>✗ Ошибка: {serverInfo.smtpError}</span> : <span style={{ color: "#A32D2D" }}>✗ Не настроен ({serverInfo?.smtpUser})</span>}
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "flex-end" }}>
          <div style={{ flex: 1 }}><div style={C.lbl}>Тестовое письмо</div><input style={C.inp} value={testEmail} onChange={e => setTestEmail(e.target.value)} placeholder="test@email.com" onKeyDown={e => e.key === "Enter" && sendTestEmail()} /></div>
          <button style={C.btn(true)} onClick={sendTestEmail}>Отправить тест</button>
        </div>
        {testResult && <div style={{ fontSize: 11, marginTop: 6, color: testResult.includes("Отправлено") ? "#3B6D11" : "#A32D2D" }}>{testResult}</div>}
      </div>

      <div style={{ ...C.card, marginTop: 10 }}>
        <div style={{ fontWeight: 600, marginBottom: 10 }}>Сервер</div>
        <div style={{ fontSize: 12, color: "var(--color-text-secondary)" }}>
          {serverInfo ? (
            <span>БД: ✓ | SMTP: {serverInfo.smtp ? "✓" : "✗"} | Ключей: {serverInfo.keys}</span>
          ) : "Загрузка..."}
        </div>
        <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
          <button style={{ ...C.btn(), color: "#A32D2D" }} onClick={() => { if (confirm("Выйти из CRM?")) { setApiKey(""); onLogout(); } }}>Выйти (сменить ключ)</button>
        </div>
      </div>

      <div style={{ ...C.card, marginTop: 10 }}>
        <div style={{ fontWeight: 600, marginBottom: 10 }}>Ставки авто (не Москва)</div>
        <p style={{ fontSize: 11, color: "var(--color-text-secondary)", marginBottom: 8 }}>Для городов кроме Москвы. Авто Москвы берётся из загруженного Excel.</p>
        {(customAuto || []).map((a, i) => (
          <div key={i} style={{ display: "flex", gap: 8, alignItems: "center", padding: "4px 0", borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
            <span style={{ flex: 1, fontWeight: 500 }}>{a.city}</span>
            <span style={{ fontSize: 11 }}>20: {a.p20.toLocaleString("ru")} ₽</span>
            <span style={{ fontSize: 11 }}>40: {a.p40.toLocaleString("ru")} ₽</span>
            <button style={{ background: "none", border: "none", cursor: "pointer", color: "var(--color-text-tertiary)" }} onClick={() => up("customAuto", p => (p||[]).filter((_, j) => j !== i))}>×</button>
          </div>
        ))}
        <div style={{ display: "flex", gap: 6, marginTop: 8, alignItems: "flex-end" }}>
          <div style={{ flex: 1 }}><div style={C.lbl}>Город</div><input style={C.inp} value={newAuto.city} onChange={e => setNewAuto(p => ({ ...p, city: e.target.value }))} placeholder="Екатеринбург" /></div>
          <div><div style={C.lbl}>20 ₽</div><input style={C.inp} type="number" value={newAuto.p20} onChange={e => setNewAuto(p => ({ ...p, p20: e.target.value }))} /></div>
          <div><div style={C.lbl}>40 ₽</div><input style={C.inp} type="number" value={newAuto.p40} onChange={e => setNewAuto(p => ({ ...p, p40: e.target.value }))} /></div>
          <button style={C.btn(true)} onClick={addAuto}>+</button>
        </div>
      </div>
    </div>
  );
}

    // ─── ROOT WITH LOGIN ───
    function Root() {
      const [authed, setAuthed] = useState(!!getApiKey());
      if (!authed) return <LoginScreen onLogin={() => setAuthed(true)} />;
      return <App onLogout={() => { setApiKey(""); setAuthed(false); }} />;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Root />);
  </script>
</body>
</html>
